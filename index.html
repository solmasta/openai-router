<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0f1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ai-router">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-32.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ai-router</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0f13;--sf:#17181e;--up:#1e2028;--br:#272932;--brs:#1e2028;--tx:#ececf1;--mu:#8b8d98;--ac:#8b8cf7;--ad:#7071e8;--ub:#242534;--ur:#2f3145;--er:#f87171;--mn:'Cascadia Code','Fira Code',ui-monospace,monospace}
.light{--bg:#ffffff;--sf:#ffffff;--up:#f5f5f7;--br:#e5e5ea;--brs:#ececf0;--tx:#1c1c1e;--mu:#8e8e93;--ac:#6d6ee8;--ad:#5a5bd6;--ub:#f0f0fb;--ur:#dcdcf5;--er:#e03131}
.light .cb pre,.light .cb code{background:#1e1e2e!important;color:#cdd6f4!important}
.light .cb,.light .ch{background:#1e1e2e;border-color:#313244}
.light code.ic{background:#efeff4;border-color:transparent;color:var(--ac)}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,system-ui,sans-serif;font-size:15.5px;line-height:1.65;display:flex;flex-direction:column;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;height:100vh;max-width:820px;width:100%;margin:0 auto;padding:0 16px}
header{display:flex;align-items:center;justify-content:space-between;padding:13px 0 12px;flex-shrink:0;gap:8px}
.hl{display:flex;align-items:center;gap:8px;min-width:0}
.wm{font-family:var(--mn);font-size:13px;color:var(--tx);letter-spacing:.02em;flex-shrink:0;font-weight:600}
.wm span{font-size:9.5px;opacity:.35;font-weight:400;margin-left:2px}
.bb{background:var(--up);border:none;border-radius:20px;padding:5px 11px;font-size:11px;font-family:var(--mn);color:var(--mu);cursor:pointer;letter-spacing:.02em;transition:background .15s,color .15s}
.bb:hover{color:var(--tx);background:var(--brs)}
.bb.or{background:rgba(245,158,11,.13);color:#f59e0b}
.hr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.mb{display:flex;align-items:center;gap:5px;background:var(--up);border:none;border-radius:20px;padding:6px 12px;color:var(--tx);font-size:12px;font-family:var(--mn);cursor:pointer;max-width:150px;overflow:hidden;transition:background .15s}
.mb:hover:not(:disabled){background:var(--brs)}
.mb:disabled{opacity:.4}
.mbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ma{color:var(--mu);font-size:9px;flex-shrink:0}
.ib{background:none;border:none;border-radius:20px;padding:9px 10px;font-size:15px;cursor:pointer;line-height:1;color:var(--mu);transition:background .15s,color .15s;min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.ib:hover{background:var(--up);color:var(--tx)}
.ib:focus-visible,.mb:focus-visible,.bp:focus-visible,.bg:focus-visible,.mic:focus-visible,.ws:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
.sb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 2px;border:none;background:none;color:var(--mu);font-size:13px;cursor:pointer;text-align:left;flex-shrink:0;border-radius:10px;transition:background .15s}
.sb:hover{color:var(--tx);background:var(--up)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--br);flex-shrink:0}
.sd.on{background:var(--ac)}
.sl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sa{font-size:16px;opacity:.35}
.chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 0 14px;display:flex;flex-direction:column;gap:22px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.es{margin:auto;color:var(--mu);font-size:14.5px;text-align:center}
.msg{display:flex;flex-direction:column;gap:6px;animation:msgIn .25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ml{font-family:var(--mn);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);display:flex;align-items:center;gap:6px;padding:0 2px}
.mu .ml{color:var(--ac)}
.body{font-size:15px;line-height:1.7;word-break:break-word;padding:0 2px}
.mu .body{background:var(--ub);border:none;border-radius:16px;padding:11px 15px;display:inline-block;max-width:92%}
.body h2{font-size:16.5px;margin:14px 0 6px}
.body h3{font-size:15.5px;margin:12px 0 5px}
.body h4{font-size:14px;margin:9px 0 4px;color:var(--mu)}
.body ul,.body ol{padding-left:22px;margin:7px 0}
.body li{margin:4px 0}
.body blockquote{border-left:3px solid var(--ac);padding-left:12px;color:var(--mu);margin:8px 0}
.body a{color:var(--ac);text-decoration:none;border-bottom:1px solid rgba(139,140,247,.35)}
.body strong{font-weight:600}
.body p{margin:5px 0}
.body.err{color:var(--er);background:rgba(248,113,113,.08);border-radius:12px;padding:11px 14px}
.ma2 .body::after{content:'';display:inline-block;width:7px;height:14px;background:var(--ac);margin-left:2px;vertical-align:middle;animation:bl .8s step-end infinite;border-radius:1px}
.acts{display:flex;gap:4px;margin-top:1px;flex-wrap:wrap;align-items:center;padding:0 2px}
.ba{background:none;border:none;color:var(--mu);font-size:11.5px;padding:4px 9px;border-radius:8px;cursor:pointer;font-family:system-ui,sans-serif;transition:background .15s,color .15s}
.ba:hover{color:var(--tx);background:var(--up)}
.ct{font-size:10.5px;color:var(--mu);font-family:var(--mn);margin-left:auto;opacity:.7}
.srch{font-size:10px;color:var(--ac);font-family:var(--mn);background:rgba(139,140,247,.1);border-radius:20px;padding:2px 8px;white-space:nowrap}
.msw{display:flex;align-items:center;gap:8px;color:var(--mu);font-size:11px;font-family:var(--mn);opacity:.6}
.msw::before,.msw::after{content:'';flex:1;height:1px;background:var(--br)}
.cb{margin:10px 0;border-radius:12px;overflow:hidden;border:1px solid var(--br)}
.ch{display:flex;justify-content:space-between;align-items:center;background:#0d1117;padding:7px 13px;font-family:var(--mn);font-size:11px;color:var(--mu)}
.cc{background:none;border:none;color:var(--mu);font-size:11px;padding:2px 8px;border-radius:6px;cursor:pointer}
.cc:hover{color:var(--tx);background:rgba(255,255,255,.06)}
.cb pre{margin:0;padding:15px;overflow-x:auto;background:#0d1117;-webkit-overflow-scrolling:touch}
.cb code{font-family:var(--mn);font-size:13px;line-height:1.65;color:#c9d1d9}
code.ic{font-family:var(--mn);font-size:13px;background:var(--up);border-radius:5px;padding:2px 6px;color:var(--ac)}
.cur{display:none}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.tb{display:flex;align-items:center;gap:8px;padding:2px 2px 6px;font-size:10.5px;color:var(--mu);font-family:var(--mn);flex-shrink:0}
.tt{flex:1;height:3px;background:var(--up);border-radius:2px;overflow:hidden}
.tf{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.tf.warn{background:#f59e0b}
.tf.danger{background:var(--er)}
.ib2{padding:8px 0 calc(14px + env(safe-area-inset-bottom,0px));flex-shrink:0;display:flex;flex-direction:column;gap:0}
.input-shell{background:var(--sf);border:1px solid var(--br);border-radius:24px;padding:6px 8px 8px;box-shadow:0 2px 12px rgba(0,0,0,.15);display:flex;flex-direction:column;gap:2px}
.ap{padding:4px 6px 0}
.ait{display:flex;flex-wrap:wrap;gap:8px}
.ai{display:flex;align-items:center;gap:6px;background:var(--up);border:none;border-radius:10px;padding:5px 9px;max-width:200px}
.ath{width:34px;height:34px;object-fit:cover;border-radius:6px;flex-shrink:0}
.aif{font-size:18px;flex-shrink:0}
.an{font-size:11.5px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.ac2{background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer;flex-shrink:0}
.ac2:hover{color:var(--er)}
#prompt{width:100%;min-height:44px;max-height:150px;font-family:-apple-system,system-ui,sans-serif;font-size:16px;color:var(--tx);background:none;border:none;padding:8px 10px 4px;resize:none;line-height:1.5;overflow-y:auto}
#prompt::placeholder{color:var(--mu)}
#prompt:focus{outline:none}
.ia{display:flex;align-items:center;gap:2px;padding:0 2px}
.ir{display:flex;gap:6px;margin-left:auto;align-items:center}
.bp{padding:8px 18px;font-size:14.5px;font-weight:600;color:#fff;background:var(--ac);border:none;border-radius:18px;cursor:pointer;transition:background .15s}
.bp:hover:not(:disabled){background:var(--ad)}
.bp:disabled{opacity:.35;cursor:default}
.bg{padding:8px 14px;font-size:13.5px;color:var(--mu);background:none;border:none;border-radius:16px;cursor:pointer;transition:background .15s,color .15s}
.bg:hover{color:var(--tx);background:var(--up)}
.bd{padding:9px 14px;font-size:14px;color:var(--er);background:none;border:1px solid rgba(248,113,113,.25);border-radius:14px;cursor:pointer}
.bd:hover{background:rgba(248,113,113,.08)}
.fw{width:100%}
.mic{background:none;border:none;border-radius:20px;padding:9px 10px;font-size:15px;cursor:pointer;line-height:1;color:var(--mu);transition:background .15s,color .15s;min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.mic:hover{background:var(--up);color:var(--tx)}
.mic.on{color:var(--er);animation:pu .8s ease-in-out infinite}
.mic.off{opacity:.3;cursor:default}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
.ws{background:none;border:none;border-radius:20px;padding:9px 10px;font-size:13px;cursor:pointer;line-height:1;color:var(--mu);transition:background .15s,color .15s;min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.ws:hover{background:var(--up);color:var(--tx)}
.ws.on{background:rgba(139,140,247,.13);color:var(--ac)}
.modal{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;backdrop-filter:blur(6px)}
.modal.hidden{display:none!important}
.sheet{width:100%;max-width:820px;margin:0 auto;background:var(--sf);border:1px solid var(--br);border-bottom:none;border-radius:22px 22px 0 0;display:flex;flex-direction:column;max-height:90vh;box-shadow:0 -8px 30px rgba(0,0,0,.25)}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--br);font-size:15px;font-weight:600;flex-shrink:0;gap:8px}
.sc{background:none;border:none;color:var(--mu);font-size:19px;cursor:pointer;padding:4px 6px;line-height:1;border-radius:50%}
.sc:hover{background:var(--up)}
.bk{background:none;border:none;color:var(--ac);font-size:21px;cursor:pointer;padding:2px 6px 2px 0;line-height:1}
.sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.sf2{padding:12px 16px;border-top:1px solid var(--br);flex-shrink:0}
.mch{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);padding:10px 4px 5px;margin-top:2px}
.mc{background:var(--up);border:none;border-radius:14px;padding:12px 14px;cursor:pointer;position:relative;transition:background .15s}
.mc:hover{background:var(--brs)}
.mc.act{background:rgba(139,140,247,.13)}
.mct{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.mcl{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcd{font-size:12px;color:var(--mu);line-height:1.5}
.mbg{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.str{background:none;border:none;font-size:14px;cursor:pointer;padding:0;line-height:1;color:var(--mu);flex-shrink:0}
.str.on{color:#f59e0b}
.cat-everyday,.cat-general{background:rgba(139,141,152,.13);color:#9ca3af}
.cat-coding{background:rgba(96,165,250,.13);color:#60a5fa}
.cat-technical,.cat-reasoning{background:rgba(167,139,250,.13);color:#a78bfa}
.cat-vision{background:rgba(52,211,153,.13);color:#34d399}
.cat-uncensored{background:rgba(248,113,113,.13);color:#f87171}
.cat-free{background:rgba(110,231,183,.13);color:#6ee7b7}
.cat-favorites{background:rgba(245,158,11,.13);color:#f59e0b}
.si{width:100%;background:var(--up);border:none;border-radius:14px;padding:10px 14px;color:var(--tx);font-size:14.5px;font-family:-apple-system,system-ui,sans-serif;margin-bottom:8px;flex-shrink:0}
.si:focus{outline:none;box-shadow:0 0 0 2px var(--ac)}
.si::placeholder{color:var(--mu)}
.pc,.pjc,.cvc{background:var(--up);border:none;border-radius:14px;padding:12px 14px;cursor:pointer;flex-shrink:0;transition:background .15s}
.pc:hover,.pjc:hover,.cvc:hover{background:var(--brs)}
.pc.act{background:rgba(139,140,247,.13)}
.ct2{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.cn{font-size:14.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cn.m{color:var(--mu);font-weight:400}
.cs{font-size:12px;color:var(--mu);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ck{font-size:11.5px;color:var(--mu);white-space:nowrap}
.cas{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ceb,.cdb{background:none;border:none;color:var(--mu);font-size:11.5px;padding:4px 9px;border-radius:8px;cursor:pointer}
.ceb:hover{color:var(--tx);background:var(--brs)}
.cdb:hover{color:var(--er);background:rgba(248,113,113,.1)}
.fi{display:block;width:100%;font-size:16px;color:var(--tx);background:var(--up);border:none;border-radius:14px;padding:10px 14px;font-family:-apple-system,system-ui,sans-serif}
.fi:focus{outline:none;box-shadow:0 0 0 2px var(--ac)}
.ta{display:block;width:100%;font-size:14.5px;color:var(--tx);background:var(--up);border:none;border-radius:14px;padding:10px 14px;resize:none;line-height:1.6;font-family:-apple-system,system-ui,sans-serif}
.ta:focus{outline:none;box-shadow:0 0 0 2px var(--ac)}
.ta::placeholder,.fi::placeholder{color:var(--mu)}
.fl{display:block;font-size:10.5px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--br)}
.sr:last-child{border-bottom:none}
.slb{font-size:14.5px;color:var(--tx)}
.ssb{font-size:12px;color:var(--mu);margin-top:2px}
.ts{width:120px;accent-color:var(--ac)}
.tv{font-family:var(--mn);font-size:13px;color:var(--ac);min-width:28px;text-align:right}
.ef{display:flex;gap:8px;justify-content:space-between;align-items:center}
.el{color:var(--mu);font-size:14px;text-align:center;padding:24px 0}
.mi{display:block;max-width:100%;border-radius:10px;margin-top:8px}
.hidden{display:none!important}
@media(max-width:520px){.app{padding:0 12px}.sheet{max-height:93vh}}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="app">
  <header>
    <div class="hl">
      <span class="wm">ai-router <span>v3.5</span></span>
      <button class="bb" id="backendBtn">DeepInfra</button>
    </div>
    <div class="hr">
      <button class="mb" id="modelBtn" disabled><span class="mbl" id="modelBtnLabel">Loading&#8230;</span><span class="ma">&#9660;</span></button>
      <button class="ib" id="settingsBtn" style="color:var(--ac)" title="Settings">&#9881;</button>
      <button class="ib" id="wprojBtn" title="Projects">&#128204;</button>
      <button class="ib" id="projectsBtn" title="Saved chats">&#128193;</button>
    </div>
  </header>
  <button class="sb" id="systemToggle">
    <span class="sd" id="systemDot"></span>
    <span class="sl" id="activePromptName">System prompt</span>
    <span class="sa">&#8250;</span>
  </button>
  <div class="chat" id="chat"><div class="es" id="emptyState">Select a model and start chatting.</div></div>
  <div class="tb hidden" id="tokenBar">
    <span id="tokenCount">0 tokens</span>
    <div class="tt"><div class="tf" id="tokenFill" style="width:0%"></div></div>
    <span id="tokenPct">0%</span>
  </div>
  <div class="ib2">
    <div class="input-shell">
      <div class="ap hidden" id="attachPreview"><div class="ait" id="attachItems"></div></div>
      <textarea id="prompt" placeholder="Ask anything&#8230;" rows="3"></textarea>
      <div class="ia">
        <button class="ib" id="attachBtn" title="Attach">&#128206;</button>
        <input type="file" id="fileInput" hidden multiple accept="image/*,.txt,.js,.ts,.jsx,.tsx,.py,.html,.css,.json,.md,.yaml,.yml,.csv,.xml,.sh">
        <button class="mic" id="micBtn" title="Voice">&#127908;</button>
        <button class="ws" id="wsBtn" title="Web search">&#128269;</button>
        <button class="ws" id="newTabBtn" title="New chat in new tab" style="color:var(--ac);font-size:17px;font-weight:400">&#43;</button>
        <div class="ir">
          <button id="clearBtn" class="bg">Clear</button>
          <button id="sendBtn" class="bp">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal hidden" id="modelModal"><div class="sheet">
  <div class="sh"><span>Choose Model</span><button class="sc" id="closeModelModal">&#10005;</button></div>
  <div class="sbody" id="modelList"></div>
</div></div>

<div class="modal hidden" id="promptModal"><div class="sheet">
  <div class="sh"><span>System Prompts</span><button class="sc" id="closePromptModal">&#10005;</button></div>
  <div class="sbody" id="promptList"></div>
  <div class="sf2" style="display:flex;gap:8px">
    <button class="bg" id="importDefaultsBtn" style="flex:1">&#11015; Defaults</button>
    <button class="bp" id="newPromptBtn" style="flex:2">+ New prompt</button>
  </div>
</div></div>

<div class="modal hidden" id="promptEditor"><div class="sheet">
  <div class="sh"><span id="editorTitle">New prompt</span><button class="sc" id="closeEditor">&#10005;</button></div>
  <div class="sbody">
    <label class="fl">Name</label>
    <input type="text" id="promptNameInput" class="fi" placeholder="e.g. Coding Expert" autocomplete="off">
    <label class="fl">Prompt</label>
    <textarea id="promptContentInput" class="ta" rows="9" placeholder="You are an expert&#8230;"></textarea>
  </div>
  <div class="sf2 ef">
    <button class="bd hidden" id="deletePromptBtn">Delete</button>
    <button class="bp" id="savePromptBtn">Save</button>
  </div>
</div></div>

<div class="modal hidden" id="projectsModal"><div class="sheet">
  <div class="sh"><span>Saved Chats</span><button class="sc" id="closeProjectsModal">&#10005;</button></div>
  <div class="sbody" id="projectList"></div>
  <div class="sf2" style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px">
      <button class="bg" id="newProjectBtn" style="flex:1">+ Folder</button>
      <button class="bp" id="saveToProjectBtn" style="flex:2">Save current chat</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="bg" id="exportBackupBtn" style="flex:1">&#11014; Export</button>
      <button class="bg" id="importBackupBtn" style="flex:1">&#11015; Import</button>
      <button class="bg" id="exportChatBtn" style="flex:1">&#128196; Chat</button>
      <input type="file" id="backupFileInput" hidden accept=".json">
    </div>
    <button class="bp fw" id="driveAuthBtn">Connect Google Drive</button>
    <button class="bg fw hidden" id="driveDisconnectBtn">Disconnect Google Drive</button>
  </div>
</div></div>

<div class="modal hidden" id="convsModal"><div class="sheet">
  <div class="sh">
    <button class="bk" id="backToProjects">&#8249;</button>
    <span id="convsProjectName">Folder</span>
    <button class="sc" id="closeConvsModal">&#10005;</button>
  </div>
  <div class="sbody">
    <input type="text" class="si" id="convSearch" placeholder="Search&#8230;">
    <div id="convsList"></div>
  </div>
</div></div>

<div class="modal hidden" id="projectEditor"><div class="sheet">
