<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ai-router">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-32.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ai-router</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1014;--surface:#16181d;--raised:#1e2028;--border:#2a2d36;
  --text:#f2f3f5;--muted:#6b7280;--accent:#818cf8;--accent-d:#6366f1;
  --user-bg:#1a1c2e;--user-br:#2d2f4a;--error:#f87171;
  --mono:'Cascadia Code','Fira Code',ui-monospace,monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.6;display:flex;flex-direction:column;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;max-width:820px;width:100%;margin:0 auto;padding:0 16px}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.hdr-left{display:flex;align-items:center;gap:10px}
.wordmark{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.06em}
.backend-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11px;font-family:var(--mono);color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.backend-btn:hover{color:var(--text);border-color:var(--muted)}
.backend-btn.or{border-color:#f59e0b;color:#f59e0b}
.hdr-right{display:flex;align-items:center;gap:8px}
.model-btn{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:var(--mono);cursor:pointer;transition:border-color .15s}
.model-btn:hover:not(:disabled){border-color:var(--muted)}
.model-btn:disabled{opacity:.4}
.model-arrow{color:var(--muted);font-size:10px}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:15px;cursor:pointer;transition:border-color .15s;line-height:1}
.icon-btn:hover{border-color:var(--muted)}
.system-bar{display:flex;align-items:center;gap:8px;width:100%;padding:9px 0;border:none;border-bottom:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;text-align:left;flex-shrink:0;transition:color .15s}
.system-bar:hover{color:var(--text)}
.system-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s}
.system-dot.on{background:var(--accent)}
.system-label{flex:1}
.system-arrow{font-size:16px;opacity:.4}
.chat{flex:1;overflow-y:auto;padding:16px 0 8px;display:flex;flex-direction:column;gap:16px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-state{margin:auto;color:var(--muted);font-size:14px;text-align:center}
.msg{display:flex;flex-direction:column;gap:4px}
.msg-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.msg-user .msg-label{color:var(--accent)}
.msg-body{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14.5px;line-height:1.75;word-break:break-word}
.msg-user .msg-body{background:var(--user-bg);border-color:var(--user-br)}
.msg-body.error{color:var(--error);border-color:var(--error)}
.msg-assistant.streaming .msg-body{border-left:3px solid var(--accent);animation:livewire 1.4s ease-in-out infinite}
@keyframes livewire{0%,100%{border-left-color:var(--accent)}50%{border-left-color:var(--accent-d)}}
.msg-img{display:block;max-width:100%;border-radius:6px;margin-top:8px}
.msg-actions{display:flex;gap:6px;margin-top:2px}
.btn-action{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:system-ui,sans-serif;padding:3px 10px;border-radius:4px;cursor:pointer}
.btn-action:hover{color:var(--text);border-color:var(--muted)}
.code-block{margin:8px 0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.code-header{display:flex;justify-content:space-between;align-items:center;background:#0d1117;padding:6px 12px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.copy-code{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:system-ui,sans-serif;padding:2px 8px;border-radius:3px;cursor:pointer}
.copy-code:hover{color:var(--text)}
.code-block pre{margin:0;padding:14px;overflow-x:auto;background:#0d1117}
.code-block code{font-family:var(--mono);font-size:13px;line-height:1.65;color:#c9d1d9}
code.inline{font-family:var(--mono);font-size:13px;background:#0d1117;border:1px solid var(--border);border-radius:3px;padding:1px 5px;color:var(--accent)}
.cursor{color:var(--accent);animation:blink .75s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.input-bar{padding:10px 0 18px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.attach-preview{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.attach-item{display:flex;align-items:center;gap:8px}
.attach-thumb{width:44px;height:44px;object-fit:cover;border-radius:5px;flex-shrink:0}
.attach-icon-file{font-size:24px;flex-shrink:0}
.attach-name{flex:1;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.attach-clear:hover{color:var(--error)}
#prompt{width:100%;min-height:68px;max-height:180px;font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;resize:none;line-height:1.5;overflow-y:auto}
#prompt::placeholder{color:var(--muted)}
#prompt:focus{outline:none;border-color:var(--accent)}
.input-actions{display:flex;align-items:center;gap:8px}
.attach-icon{font-size:18px;padding:6px 8px}
.input-right{display:flex;gap:8px;margin-left:auto}
.btn-primary{padding:10px 22px;font-size:15px;font-weight:500;font-family:system-ui,sans-serif;color:#fff;background:var(--accent);border:none;border-radius:8px;cursor:pointer;transition:background .15s,opacity .15s}
.btn-primary:hover:not(:disabled){background:var(--accent-d)}
.btn-primary:disabled{opacity:.4;cursor:default}
.full-w{width:100%}
.btn-ghost{padding:10px 16px;font-size:15px;font-family:system-ui,sans-serif;color:var(--muted);background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:color .15s,border-color .15s}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{padding:10px 16px;font-size:15px;font-family:system-ui,sans-serif;color:var(--error);background:none;border:1px solid #3d1f1f;border-radius:8px;cursor:pointer}
.btn-danger:hover{background:#1f1010;border-color:var(--error)}
.modal{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal.hidden{display:none!important}
.sheet{width:100%;max-width:820px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:18px 18px 0 0;display:flex;flex-direction:column;max-height:82vh}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;flex-shrink:0;gap:8px}
.sheet-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:0 6px 0 0;line-height:1;flex-shrink:0}
.sheet-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.sheet-footer{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.editor-footer{display:flex;gap:8px;justify-content:space-between;align-items:center}
.model-cat-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 4px 4px;margin-top:4px}
.model-card{background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.model-card:active{opacity:.8}
.model-card.active{border-color:var(--accent);background:#1a1a2e}
.model-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.model-card-label{font-size:14px;font-weight:500}
.model-card-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.model-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.cat-general,.cat-everyday{background:#1e2028;color:#9ca3af;border:1px solid #374151}
.cat-coding,.cat-blockchain{background:#0f1f35;color:#60a5fa;border:1px solid #1e3a5f}
.cat-reasoning,.cat-technical{background:#1a1030;color:#a78bfa;border:1px solid #3730a3}
.cat-vision{background:#0f2118;color:#34d399;border:1px solid #065f46}
.cat-uncensored{background:#2d1515;color:#f87171;border:1px solid #7f1d1d}
.cat-recommended{background:#1a1a2e;color:#818cf8;border:1px solid #4338ca}
.cat-free{background:#0f2820;color:#6ee7b7;border:1px solid #064e3b}
.empty-list{color:var(--muted);font-size:14px;text-align:center;padding:24px 0;line-height:1.9}
.prompt-card,.project-card,.conv-card{background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.prompt-card.active{border-color:var(--accent);background:#1a1a2e}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.card-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-name.muted{color:var(--muted);font-weight:400}
.card-sub{font-size:12.5px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-count{font-size:12px;color:var(--muted);white-space:nowrap}
.card-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.card-edit-btn,.card-del-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:system-ui,sans-serif;padding:3px 9px;border-radius:4px;cursor:pointer;flex-shrink:0}
.card-edit-btn:hover{color:var(--text);border-color:var(--muted)}
.card-del-btn:hover{color:var(--error);border-color:var(--error)}
.editor-form{gap:8px}
.field-label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.field-input{width:100%;font-family:system-ui,sans-serif;font-size:15px;color:var(--text);background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.field-input:focus{outline:none;border-color:var(--accent)}
.field-textarea{display:block;width:100%;font-family:system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:10px 12px;resize:none;line-height:1.6}
.field-textarea:focus{outline:none;border-color:var(--accent)}
.field-textarea::placeholder,.field-input::placeholder{color:var(--muted)}
.hidden{display:none!important}
@media(max-width:520px){.app{padding:0 12px}.sheet{max-height:88vh}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hdr-left">
      <span class="wordmark">ai-router</span>
      <button class="backend-btn" id="backendBtn">DeepInfra</button>
    </div>
    <div class="hdr-right">
      <button class="model-btn" id="modelBtn" disabled>
        <span id="modelBtnLabel">Loading&#8230;</span>
        <span class="model-arrow">&#9660;</span>
      </button>
      <button class="icon-btn" id="projectsBtn">&#128193;</button>
    </div>
  </header>
  <button class="system-bar" id="systemToggle">
    <span class="system-dot" id="systemDot"></span>
    <span class="system-label" id="activePromptName">System prompt</span>
    <span class="system-arrow">&#8250;</span>
  </button>
  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">Select a model and start chatting.</div>
  </div>
  <div class="input-bar">
    <div class="attach-preview hidden" id="attachPreview"></div>
    <textarea id="prompt" placeholder="Ask anything&#8230;" spellcheck="false" rows="3"></textarea>
    <div class="input-actions">
      <button class="icon-btn attach-icon" id="attachBtn">&#128206;</button>
      <input type="file" id="fileInput" hidden accept="image/*,.txt,.js,.ts,.jsx,.tsx,.py,.html,.css,.json,.md,.yaml,.yml,.csv,.xml,.sh">
      <div class="input-right">
        <button id="clearBtn" class="btn-ghost">Clear</button>
        <button id="sendBtn" class="btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>
<div class="modal hidden" id="modelModal"><div class="sheet">
  <div class="sheet-header"><span>Choose Model</span><button class="sheet-close" id="closeModelModal">&#10005;</button></div>
  <div class="sheet-body" id="modelList"></div>
</div></div>
<div class="modal hidden" id="promptModal"><div class="sheet">
  <div class="sheet-header"><span>System Prompts</span><button class="sheet-close" id="closePromptModal">&#10005;</button></div>
  <div class="sheet-body" id="promptList"></div>
  <div class="sheet-footer"><button class="btn-primary full-w" id="newPromptBtn">+ New prompt</button></div>
</div></div>
<div class="modal hidden" id="promptEditor"><div class="sheet">
  <div class="sheet-header"><span id="editorTitle">New prompt</span><button class="sheet-close" id="closeEditor">&#10005;</button></div>
  <div class="sheet-body editor-form">
    <label class="field-label">Name</label>
    <input type="text" id="promptNameInput" class="field-input" placeholder="e.g. Coding Expert" autocomplete="off">
    <label class="field-label">Prompt</label>
    <textarea id="promptContentInput" class="field-textarea" rows="7" placeholder="You are an expert&#8230;"></textarea>
  </div>
  <div class="sheet-footer editor-footer">
    <button class="btn-danger" id="deletePromptBtn">Delete</button>
    <button class="btn-primary" id="savePromptBtn">Save</button>
  </div>
</div></div>
<div class="modal hidden" id="projectsModal"><div class="sheet">
  <div class="sheet-header"><span>Saved Chats</span><button class="sheet-close" id="closeProjectsModal">&#10005;</button></div>
  <div class="sheet-body" id="projectList"></div>
  <div class="sheet-footer editor-footer">
    <button class="btn-ghost" id="newProjectBtn">+ New folder</button>
    <button class="btn-primary" id="saveToProjectBtn">Save current chat</button>
  </div>
</div></div>
<div class="modal hidden" id="convsModal"><div class="sheet">
  <div class="sheet-header">
    <button class="back-btn" id="backToProjects">&#8249;</button>
    <span id="convsProjectName">Folder</span>
    <button class="sheet-close" id="closeConvsModal">&#10005;</button>
  </div>
  <div class="sheet-body" id="convsList"></div>
</div></div>
<div class="modal hidden" id="projectEditor"><div class="sheet">
  <div class="sheet-header"><span id="projEditorTitle">New folder</span><button class="sheet-close" id="closeProjEditor">&#10005;</button></div>
  <div class="sheet-body editor-form">
    <label class="field-label">Folder name</label>
    <input type="text" id="projNameInput" class="field-input" placeholder="e.g. Work, HVAC, Personal" autocomplete="off">
  </div>
  <div class="sheet-footer editor-footer">
    <button class="btn-danger hidden" id="deleteProjBtn">Delete</button>
    <button class="btn-primary" id="saveProjBtn">Save</button>
  </div>
</div></div>
<script>

(function() {

/* ── Backends ── */
var DI_URL = 'https://openai-router.lukedorsett.workers.dev';
var OR_URL = 'https://openaiworker.lukedorsett.workers.dev';

var BACKENDS = {
  deepinfra: {
    name: 'DeepInfra', url: DI_URL,
    def: 'mistralai/Mistral-7B-Instruct-v0.3',
    models: [
      {id:'mistralai/Mistral-7B-Instruct-v0.3',label:'Mistral 7B',cat:'Recommended',
        desc:'Best starting point. Fast, accurate, cheap, and reliable. Use this for everyday questions, writing, emails, and anything you just need done quickly. Very stable model.'},
      {id:'meta-llama/Llama-3.3-70B-Instruct',label:'Llama 3.3 70B',cat:'Recommended',
        desc:'Step up when you need more power. Handles complex questions, long documents, detailed explanations, and multi-step tasks. Still fast enough for daily use.'},
      {id:'deepseek-ai/DeepSeek-R1',label:'DeepSeek R1',cat:'Recommended',
        desc:'Best for anything technical or analytical. Use for HVAC troubleshooting, diagnosing system problems, step-by-step logic, calculations, and hard decisions. Thinks before answering.'},
      {id:'Qwen/Qwen2.5-Coder-32B-Instruct',label:'Qwen 2.5 Coder 32B',cat:'Recommended',
        desc:'Best for code and XRP Ledger work. Purpose-built for programming. Use for XRPL.js, smart contracts, debugging code, and technical blockchain questions.'},
      {id:'Qwen/Qwen3.5-2B',label:'Qwen 3.5 2B',cat:'Everyday',
        desc:'Tiny and ultra-fast. Use only for very simple quick questions where speed matters more than quality. Not for complex or technical tasks.'},
      {id:'meta-llama/Llama-3.2-3B-Instruct',label:'Llama 3.2 3B',cat:'Everyday',
        desc:'Small and fast. Good for basic Q/A and short summaries. Struggles with anything technical or long.'},
      {id:'meta-llama/Meta-Llama-3.1-8B-Instruct',label:'Llama 3.1 8B',cat:'Everyday',
        desc:'Solid 8B everyday model. Good for writing help, summarizing, and general questions at low cost.'},
      {id:'Qwen/Qwen3.5-27B',label:'Qwen 3.5 27B',cat:'Everyday',
        desc:'Balanced mid-size. Handles longer conversations and multi-step tasks better than 7B models without the cost of a 70B.'},
      {id:'meta-llama/Llama-4-Scout-17B-16E-Instruct',label:'Llama 4 Scout',cat:'Everyday',
        desc:'Meta latest with 328K context window. Best when you need to feed in very long documents, full reports, or entire conversation histories without losing track.'},
      {id:'Qwen/Qwen2.5-72B-Instruct',label:'Qwen 2.5 72B',cat:'Coding',
        desc:'Top all-around coding model. Excellent at writing, debugging, and explaining code across all major languages. Also strong for technical documentation.'},
      {id:'deepseek-ai/DeepSeek-V3.2',label:'DeepSeek V3.2',cat:'Coding',
        desc:'Best open-source coder available. Use for complex multi-file projects, architecture decisions, and hard debugging. Rivals GPT-4 on coding benchmarks.'},
      {id:'deepseek-ai/DeepSeek-R1-Distill-Qwen-7B',label:'DeepSeek R1 7B',cat:'Technical',
        desc:'Fast reasoning model. Great for math, logic, and step-by-step problem solving. Faster and cheaper than full R1 when you need quick reasoning.'},
      {id:'meta-llama/Llama-3.2-11B-Vision-Instruct',label:'Llama 3.2 11B Vision',cat:'Vision',
        desc:'Use this when attaching images. Good for reading equipment nameplates, wiring diagrams, screenshots, and photos. Tap the paperclip to attach.'},
      {id:'meta-llama/Llama-3.2-90B-Vision-Instruct',label:'Llama 3.2 90B Vision',cat:'Vision',
        desc:'More powerful vision model. Better for complex technical images, charts, dense text in photos, and P&ID diagrams.'},
      {id:'Qwen/Qwen2.5-VL-72B-Instruct',label:'Qwen 2.5 VL 72B',cat:'Vision',
        desc:'Strongest vision on DeepInfra. Best for multi-page documents, technical drawings, and images where every detail matters.'}
    ]
  },
  openrouter: {
    name: 'OpenRouter', url: OR_URL,
    def: 'nousresearch/hermes-3-llama-3.1-70b',
    models: [
      {id:'nousresearch/hermes-3-llama-3.1-70b',label:'Hermes 3 70B',cat:'Uncensored',
        desc:'NousResearch uncensored model. No content filters. Will engage with any topic openly. Best for conversations and topics other models refuse. Paid.'},
      {id:'cognitivecomputations/dolphin-mixtral-8x22b',label:'Dolphin Mixtral 8x22B',cat:'Uncensored',
        desc:'Flagship uncensored Dolphin on Mixtral. Helpful without restrictions. Strong reasoning and no refusals. Best all-around uncensored option. Paid.'},
      {id:'nousresearch/hermes-3-llama-3.1-405b',label:'Hermes 3 405B',cat:'Uncensored',
        desc:'Largest Hermes. Maximum power with zero content filtering. Use for the most complex uncensored tasks. Paid.'},
      {id:'sao10k/l3.1-euryale-70b',label:'Euryale 70B',cat:'Uncensored',
        desc:'Specialized for creative and roleplay. Uncensored, expressive, deep character consistency. Paid.'},
      {id:'openrouter/free',label:'Auto Free Router',cat:'Free',
        desc:'OpenRouter automatically picks the best available free model. Good for experimenting at zero cost. Always free.'},
      {id:'meta-llama/llama-3.3-70b-instruct:free',label:'Llama 3.3 70B (Free)',cat:'Free',
        desc:'Meta strong 70B free on OpenRouter. Good general capability. 20 requests per minute limit. Free.'},
      {id:'deepseek/deepseek-r1:free',label:'DeepSeek R1 (Free)',cat:'Free',
        desc:'Full reasoning model via OpenRouter free tier. Great for hard problems at zero cost. Rate limited. Free.'},
      {id:'google/gemma-3-27b-it:free',label:'Gemma 3 27B (Free)',cat:'Free',
        desc:'Google Gemma 3 free on OpenRouter. Solid general tasks and writing. Rate limited. Free.'}
    ]
  }
};
var activeBackend = 'deepinfra';
var workerUrl = '';
var allModels = [];
var currentModel = {id:'', label:''};
var chatHistory = [];
var sending = false;
var attachedFile = null;
var activePromptId = null;
var editingId = null;
var editingProjId = null;

/* ── Config / Backend ── */
function loadBackend() {
  var B = BACKENDS[activeBackend];
  workerUrl = B.url;
  allModels = B.models; // fallback
  var def = allModels.find(function(m) { return m.id === B.def; }) || allModels[0];
  setModel(def);
  renderModelList();
  document.getElementById('modelBtn').disabled = false;
  var bb = document.getElementById('backendBtn');
  bb.textContent = B.name;
  bb.className = 'backend-btn' + (activeBackend === 'openrouter' ? ' or' : '');
  fetchLiveModels();
}

var MODEL_CACHE_KEY = 'ai_models_cache';
var MODEL_CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

async function fetchLiveModels() {
  var B = BACKENDS[activeBackend];
  var cacheKey = MODEL_CACHE_KEY + '_' + activeBackend;

  // Check cache
  try {
    var cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && Date.now() - cached.ts < MODEL_CACHE_TTL) {
      allModels = cached.models;
      renderModelList();
      // Set model to default if not already set
      if (!currentModel.id) {
        var def = allModels.find(function(m){ return m.id === B.def; }) || allModels[0];
        if (def) setModel(def);
      }
      return;
    }
  } catch(e) {}

  // Fetch live
  try {
    var res = await fetch(B.url + '/models');
    var data = await res.json();
    var parsed = parseModelList(data);
    if (parsed.length > 0) {
      allModels = parsed;
      localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), models: parsed }));
      renderModelList();
      if (!currentModel.id || !parsed.find(function(m){ return m.id === currentModel.id; })) {
        var def = parsed.find(function(m){ return m.id === B.def; }) || parsed[0];
        if (def) setModel(def);
      }
    }
  } catch(e) {
    console.log('Live model fetch failed, using fallback:', e);
  }
}

/* Trusted provider prefixes for live model filtering */
var TRUSTED = ['meta-llama','deepseek','deepseek-ai','mistralai','qwen','google',
  'nousresearch','cognitivecomputations','sao10k','anthropic','openai','nvidia',
  'microsoft','cohere','01-ai','moonshotai','x-ai','amazon'];

function parseModelList(data) {
  var models = data.data || [];
  /* Get IDs already in our hardcoded list to avoid duplicates */
  var B = BACKENDS[activeBackend];
  var pinnedIds = B.models.map(function(m){ return m.id; });

  if (activeBackend === 'openrouter') {
    var filtered = models.filter(function(m) {
      if (!m.id || !m.name || !m.context_length) return false;
      if (m.context_length < 32000) return false; /* Skip tiny context models */
      if (pinnedIds.indexOf(m.id) > -1) return false; /* Already shown */
      /* Only trusted providers */
      var prefix = m.id.split('/')[0];
      if (TRUSTED.indexOf(prefix) < 0) return false;
      /* Skip obviously old/experimental */
      var id = m.id.toLowerCase();
      if (id.includes('gpt-3') || id.includes('slerp') || id.includes('weaver') ||
          id.includes('remm') || id.includes('mytho') || id.includes('alpha') ||
          id.includes('preview') || id.includes('deprecated')) return false;
      return true;
    });
    return filtered.slice(0, 25).map(function(m) {
      var p = m.pricing || {};
      var isFree = p.prompt === '0' && p.completion === '0';
      var id = m.id.toLowerCase();
      var cat;
      if (isFree) cat = 'Free';
      else if (id.includes('dolphin')||id.includes('hermes')||id.includes('euryale')) cat = 'Uncensored';
      else if (id.includes('vision')||id.includes('-vl')||id.includes('pixtral')) cat = 'Vision';
      else if (id.includes('coder')||id.includes('code')||id.includes('deepseek-v')) cat = 'Coding';
      else if (id.includes('r1')||id.includes('reason')||id.includes('think')) cat = 'Technical';
      else cat = 'Everyday';
      var label = m.name.replace(/^[^:]+:\s*/,'').slice(0, 32);
      var ctx = m.context_length ? Math.round(m.context_length/1000)+'K ctx' : '';
      return { id:m.id, label:label, cat:cat, desc:(isFree?'Free. ':'')+ctx+'. Live from OpenRouter.' };
    }).sort(function(a,b){
      var o = {Free:0,Uncensored:1,Everyday:2,Coding:3,Technical:4,Vision:5};
      return (o[a.cat]||9)-(o[b.cat]||9);
    });
  } else {
    /* DeepInfra - filter to chat models only */
    return models.filter(function(m) {
      if (!m.id) return false;
      if (pinnedIds.indexOf(m.id) > -1) return false;
      var id = m.id.toLowerCase();
      if (id.includes('embed')||id.includes('whisper')||id.includes('tts')||
          id.includes('stable')||id.includes('flux')||id.includes('sdxl')) return false;
      return true;
    }).slice(0, 20).map(function(m) {
      var id = m.id.toLowerCase();
      var cat;
      if (id.includes('vision')||id.includes('-vl')) cat = 'Vision';
      else if (id.includes('coder')||id.includes('deepseek-v')) cat = 'Coding';
      else if (id.includes('r1')||id.includes('reasoner')) cat = 'Technical';
      else cat = 'Everyday';
      var label = m.id.split('/').pop().replace(/-instruct$/i,'').replace(/-chat$/i,'').slice(0,30);
      return { id:m.id, label:label, cat:cat, desc:'Live from DeepInfra. '+m.id };
    });
  }
}

function setModel(m) {

  list.innerHTML = '';

        + '<span class="model-badge cat-' + m.cat.toLowerCase() + '">' + m.cat + '</span>'

      });

/* ── File attach ── */
async function compressImage(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var MAX = 1024, w = img.width, h = img.height;
        if (w > MAX || h > MAX) { var r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function readText(file) {
  return new Promise(function(resolve) {
    var r = new FileReader();
    r.onload = function(e) { resolve(e.target.result); };
    r.readAsText(file);
  });
}

/* ── System prompts ── */
var PK = 'ai_prompts';
function loadPrompts() {
  try { var s = JSON.parse(localStorage.getItem(PK)||'{}'); prompts = s.prompts||[]; activePromptId = s.activeId||null; } catch(e) { prompts=[]; activePromptId=null; }
  refreshPromptLabel();
}
function savePrompts() { localStorage.setItem(PK, JSON.stringify({prompts:prompts,activeId:activePromptId})); }
function getActivePrompt() { return prompts.find(function(p){return p.id===activePromptId;})||null; }
function refreshPromptLabel() {
  var a = getActivePrompt();
  document.getElementById('activePromptName').textContent = a ? a.name : 'System prompt';
  document.getElementById('systemDot').classList.toggle('on', !!a);
}
function renderPromptList() {
  var list = document.getElementById('promptList');
  list.innerHTML = '';
  if (!prompts.length) { list.innerHTML = '<p class="empty-list">No prompts yet.<br>Tap <strong>+ New prompt</strong> to create one.</p>'; }
  else {
    var none = document.createElement('div');
    none.className = 'prompt-card' + (!activePromptId ? ' active' : '');
    none.innerHTML = '<div class="card-top"><span class="card-name muted">None</span></div><div class="card-sub">No system prompt</div>';
    none.addEventListener('click', function(){ activePromptId=null; savePrompts(); refreshPromptLabel(); renderPromptList(); });
    list.appendChild(none);
    prompts.forEach(function(p) {
      var card = document.createElement('div');
      card.className = 'prompt-card' + (p.id===activePromptId ? ' active' : '');
      card.innerHTML = '<div class="card-top"><span class="card-name">' + esc(p.name) + '</span><button class="card-edit-btn">Edit</button></div>'
        + '<div class="card-sub">' + esc(p.content.slice(0,100)) + (p.content.length>100?'...':'') + '</div>';
      card.addEventListener('click', function(e) {
        if (e.target.classList.contains('card-edit-btn')) return;
        activePromptId = p.id; savePrompts(); refreshPromptLabel(); renderPromptList();
      });
      card.querySelector('.card-edit-btn').addEventListener('click', function(e) { e.stopPropagation(); openPromptEditor(p.id); });
      list.appendChild(card);
    });
  }
}
function openPromptEditor(id) {
  editingId = id || null;
  var p = id ? prompts.find(function(x){return x.id===id;}): null;
  document.getElementById('editorTitle').textContent = id ? 'Edit prompt' : 'New prompt';
  document.getElementById('promptNameInput').value = p ? p.name : '';
  document.getElementById('promptContentInput').value = p ? p.content : '';
  document.getElementById('deletePromptBtn').style.display = id ? 'block' : 'none';
  openModal('promptEditor');
  setTimeout(function(){ document.getElementById('promptNameInput').focus(); }, 80);
}
function savePrompt() {
  var name = document.getElementById('promptNameInput').value.trim();
  var content = document.getElementById('promptContentInput').value.trim();
  if (!name || !content) return;
  if (editingId) {
    var idx = prompts.findIndex(function(p){return p.id===editingId;});
    if (idx > -1) prompts[idx] = {id:prompts[idx].id, name:name, content:content};
  } else {
    var id = Date.now().toString();
    prompts.push({id:id, name:name, content:content});
    activePromptId = id;
  }
  savePrompts(); refreshPromptLabel(); closeModal('promptEditor'); renderPromptList();
}
function deletePromptItem() {
  if (!editingId) return;
  prompts = prompts.filter(function(p){return p.id!==editingId;});
  if (activePromptId===editingId) activePromptId = null;
  savePrompts(); refreshPromptLabel(); closeModal('promptEditor'); renderPromptList(); editingId = null;
}

function openConvsModal(projId) {
  viewingProjId = projId;
  var proj = projects.find(function(p){return p.id===projId;});
  document.getElementById('convsProjectName').textContent = proj.name;
  renderConvsList(proj); closeModal('projectsModal'); openModal('convsModal');
}
function renderConvsList(proj) {
  var list = document.getElementById('convsList');
  list.innerHTML = '';
  var convs = proj.conversations || [];
  if (!convs.length) { list.innerHTML = '<p class="empty-list">No saved chats here.</p>'; return; }
  convs.slice().reverse().forEach(function(conv) {
    var card = document.createElement('div');
    card.className = 'conv-card';
    var date = new Date(conv.savedAt).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
    card.innerHTML = '<div class="card-top"><span class="card-name">' + esc(conv.title) + '</span>'
      + '<button class="card-del-btn">&#10005;</button></div>'
      + '<div class="card-sub">' + esc(conv.modelLabel) + ' &middot; ' + date + ' &middot; ' + conv.messages.length + ' messages</div>';
    card.addEventListener('click', function(e) { if(e.target.classList.contains('card-del-btn')) return; loadConversation(conv); });
    card.querySelector('.card-del-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      proj.conversations = proj.conversations.filter(function(c){return c.id!==conv.id;});
      saveProjects(); renderConvsList(proj);
    });
    list.appendChild(card);
  });
}
function saveCurrentChat(projId) {
  if (!chatHistory.length) { alert('No conversation to save.'); return; }
  var proj = projects.find(function(p){return p.id===projId;});
  var first = chatHistory.find(function(m){return m.role==='user';});
  var raw = typeof first.content==='string' ? first.content : ((first.content.find(function(c){return c.type==='text';})||{}).text||'Chat');
  proj.conversations = proj.conversations || [];
  proj.conversations.push({
    id: Date.now().toString(),
    title: raw.slice(0,50) + (raw.length>50?'...':''),
    savedAt: Date.now(),
    modelId: currentModel.id,
    modelLabel: currentModel.label,
    messages: chatHistory.map(function(m) {
      return {role:m.role, content:typeof m.content==='string'?m.content:((m.content.find(function(c){return c.type==='text';})||{}).text||'')};
    })
  });
  saveProjects(); closeModal('projectsModal');
}
function loadConversation(conv) {
  if (chatHistory.length && !confirm('Load this chat? Current chat will be cleared.')) return;
  chatHistory = conv.messages.map(function(m){return {role:m.role,content:m.content};});
  document.getElementById('chat').innerHTML = '';
  var def = allModels.find(function(m){return m.id===conv.modelId;});
  if (def) setModel(def);
  chatHistory.forEach(function(m){ appendMessage(m.role, m.content); });
  closeModal('convsModal');
}
function openProjEditor(id) {
  editingProjId = id || null;
  var proj = id ? projects.find(function(p){return p.id===id;}): null;
  document.getElementById('projEditorTitle').textContent = id ? 'Edit folder' : 'New folder';
  document.getElementById('projNameInput').value = proj ? proj.name : '';
  document.getElementById('deleteProjBtn').classList.toggle('hidden', !id);
  openModal('projectEditor');
  setTimeout(function(){ document.getElementById('projNameInput').focus(); }, 80);
}
function saveProject() {
  var name = document.getElementById('projNameInput').value.trim();
  if (!name) return;
  if (editingProjId) { var proj=projects.find(function(p){return p.id===editingProjId;}); if(proj) proj.name=name; }
  else { projects.push({id:Date.now().toString(), name:name, conversations:[]}); }
  saveProjects(); closeModal('projectEditor'); renderProjectList(); editingProjId = null;
}
function deleteProject() {
  if (!editingProjId) return;
  projects = projects.filter(function(p){return p.id!==editingProjId;});
  saveProjects(); closeModal('projectEditor'); renderProjectList(); editingProjId = null;
}

/* ── Render ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderText(t) {
  return esc(t).replace(/`([^`]+)`/g, '<code class="inline">$1</code>').replace(/\n/g,'<br>');
}
function renderContent(raw) {
  if (typeof raw !== 'string') return esc(String(raw));
  var text = raw.replace(/<think>[\s\S]*?<\/think>\n?/g,'').replace(/<think>[\s\S]*$/,'').trim();
  var result = '', last = 0;
  var re = /```(\w*)\n?([\s\S]*?)```/g, m;
  while ((m = re.exec(text)) !== null) {
    result += renderText(text.slice(last, m.index));
    var lang = m[1].trim(), code = m[2].trim();
    result += '<div class="code-block"><div class="code-header"><span>' + (lang||'code') + '</span>'
      + '<button class="copy-code" onclick="window.copyCode(this)">Copy</button></div>'
      + '<pre><code>' + esc(code) + '</code></pre></div>';
    last = m.index + m[0].length;
  }
  return result + renderText(text.slice(last));
}
window.copyCode = function(btn) {
  navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').textContent).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function(){ btn.textContent = 'Copy'; }, 2000);
  });
};

/* ── Chat ── */
function hideEmpty() { var el = document.getElementById('emptyState'); if (el) el.remove(); }
function scrollNear(el) {
  var chat = document.getElementById('chat');
  if (chat.scrollHeight - chat.scrollTop - chat.clientHeight < 150) el.scrollIntoView({behavior:'smooth',block:'end'});
}
function appendMessage(role, content, streaming) {
  hideEmpty();
  var chat = document.getElementById('chat');
  var wrap = document.createElement('div'); wrap.className = 'msg msg-' + role;
  var label = document.createElement('div'); label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : currentModel.label;
  var body = document.createElement('div'); body.className = 'msg-body';
  if (streaming) {
    body.innerHTML = '<span class="cursor">&#9607;</span>';
    wrap.classList.add('streaming');
  } else if (Array.isArray(content)) {
    var txt = (content.find(function(c){return c.type==='text';})||{}).text||'';
    var img = content.find(function(c){return c.type==='image_url';});
    body.innerHTML = (txt?renderContent(txt):'') + (img?'<img class="msg-img" src="'+img.image_url.url+'">':'');
  } else {
    body.innerHTML = renderContent(content||'');
  }
  wrap.appendChild(label); wrap.appendChild(body);
  if (role === 'assistant') {
    var actions = document.createElement('div'); actions.className = 'msg-actions';
    var copyBtn = document.createElement('button'); copyBtn.textContent = 'Copy'; copyBtn.className = 'btn-action';
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(body.innerText.replace(/\n\n/g,'\n')).then(function() {
        copyBtn.textContent = 'Copied!'; setTimeout(function(){ copyBtn.textContent = 'Copy'; }, 2000);
      });
    };
    actions.appendChild(copyBtn); wrap.appendChild(actions);
  }
  chat.appendChild(wrap); wrap.scrollIntoView({behavior:'smooth',block:'end'});
  return {wrap:wrap, body:body};
}

/* ── Auto-save ── */
var AUTOSAVE_KEY = 'ai_autosave';

function autoSave() {
  if (!chatHistory.length) return;
  try {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      modelId: currentModel.id,
      modelLabel: currentModel.label,
      backend: activeBackend,
      savedAt: Date.now(),
      messages: chatHistory.map(function(m) {
        return {
          role: m.role,
          content: typeof m.content === 'string' ? m.content
            : ((m.content.find(function(c){ return c.type==='text'; })||{}).text||'')
        };
      })
    }));
  } catch(e) {}
}

function loadAutoSave() {
  try {
    var saved = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if (!saved || !saved.messages || !saved.messages.length) return;
    chatHistory = saved.messages.map(function(m){ return {role:m.role, content:m.content}; });
    var def = allModels.find(function(m){ return m.id === saved.modelId; });
    if (def) setModel(def);
    chatHistory.forEach(function(m){ appendMessage(m.role, m.content); });
  } catch(e) {}
}

/* ── Send ── */
async function send() {
  if (sending) return;
  var promptEl = document.getElementById('prompt');
  var text = promptEl.value.trim();
  if (!text && !attachedFile) return;
  var ap = getActivePrompt();
  var btn = document.getElementById('sendBtn');
  sending = true; btn.disabled = true; btn.textContent = 'Sending\u2026';
  var userContent = text, histContent = text;
  if (attachedFile && attachedFile.type === 'image') {
    userContent = [{type:'text',text:text||'What do you see?'},{type:'image_url',image_url:{url:attachedFile.dataUrl}}];
    histContent = userContent;
  } else if (attachedFile && attachedFile.type === 'text') {
    userContent = histContent = 'File: ' + attachedFile.name + '\n```\n' + attachedFile.content + '\n```\n\n' + text;
  }
  chatHistory.push({role:'user', content:histContent});
  appendMessage('user', histContent);
  promptEl.value = ''; promptEl.style.height = ''; clearAttachment();
  var messages = [];
  if (ap) messages.push({role:'system', content:ap.content});
  messages = messages.concat(chatHistory.slice(0,-1));
  messages.push({role:'user', content:userContent});
  var asstMsg = appendMessage('assistant', '', true);
  var full = '';
  try {
    var res = await fetch(workerUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model:currentModel.id, messages:messages, temperature:0.7, stream:true})
    });
    if (!res.ok) {
      var errData = await res.json().catch(function(){return{};});
      throw new Error((errData.error&&errData.error.message)||'HTTP '+res.status);
    }
    var reader = res.body.getReader(), dec = new TextDecoder(), buf = '';
    var done = false;
    while (!done) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += dec.decode(chunk.value, {stream:true});
      var lines = buf.split('\n'); buf = lines.pop();
      for (var i=0; i<lines.length; i++) {
        var ln = lines[i].trim();
        if (!ln.startsWith('data: ')) continue;
        var d = ln.slice(6);
        if (d === '[DONE]') { done = true; break; }
        try {
          var tok = ((JSON.parse(d).choices||[])[0]||{});
          tok = tok.delta && tok.delta.content;
          if (tok) {
            full += tok;
            asstMsg.body.innerHTML = renderContent(full) + '<span class="cursor">&#9607;</span>';
            scrollNear(asstMsg.wrap);
          }
        } catch(ex) {}
      }
    }
    asstMsg.wrap.classList.remove('streaming');
    asstMsg.body.innerHTML = renderContent(full || '(empty response)');
    chatHistory.push({role:'assistant', content:full});
    autoSave();
  } catch(e) {
    asstMsg.wrap.classList.remove('streaming');
    asstMsg.body.className = 'msg-body error';
    asstMsg.body.innerHTML = 'Error: ' + esc(e.message);
    chatHistory.pop();
  } finally {
    sending = false; btn.disabled = false; btn.textContent = 'Send';
  }
}

document.getElementById('sendBtn').addEventListener('click', send);
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 180) + 'px';
});
document.getElementById('clearBtn').addEventListener('click', function() {
  chatHistory = []; clearAttachment(); localStorage.removeItem(AUTOSAVE_KEY);
  document.getElementById('chat').innerHTML = '<div class="empty-state" id="emptyState">Select a model and start chatting.</div>';
});

/* ── Init ── */
loadBackend();
loadPrompts();
loadProjects();

})();

</script>
